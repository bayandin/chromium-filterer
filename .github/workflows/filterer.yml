name: CI

on:
  push:
    branches:
      - master
  schedule:
    - cron: 0 */12 * * *
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: clone chromium
      run: |
        git clone --filter=blob:none --single-branch --sparse --progress --verbose \
          https://github.com/chromium/chromium

    - name: backfill chromedriver blobs
      working-directory: chromium
      run: |
        git sparse-checkout set chrome/test/chromedriver
        git backfill --sparse

    - name: extract chromedriver history
      run: |
        git init -b main chromedriver
        (cd chromium && python3 ../extract_chromedriver.py) | git -C chromedriver fast-import --done

    - name: push
      env:
        GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
      working-directory: chromedriver
      run: |
        git config --global user.email "8435085+T3-M4@users.noreply.github.com"
        git config --global user.name  "T3-M4"
        git remote add chromedriver https://T3-M4:${GITHUB_TOKEN}@github.com/bayandin/chromedriver.git
        git push --set-upstream chromedriver main
